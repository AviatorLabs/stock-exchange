<svg
        viewBox="0 0 400 400"
        width="400"
        height="400"
        xmlns="http://www.w3.org/2000/svg"
      >
        {/* Outer circle — dark charcoal ring */}
        <circle cx="200" cy="200" r="195" fill="#111111" />

        {/* Red arc — top half */}
        <path
          d="M 200 18 A 182 182 0 0 1 382 200"
          fill="none"
          stroke="#D72B2B"
          strokeWidth="18"
          strokeLinecap="round"
        />
        {/* Green arc — bottom half */}
        <path
          d="M 382 200 A 182 182 0 0 1 18 200"
          fill="none"
          stroke="#1E8C3A"
          strokeWidth="18"
          strokeLinecap="round"
        />
        {/* Red arc — complete left side */}
        <path
          d="M 18 200 A 182 182 0 0 1 200 18"
          fill="none"
          stroke="#D72B2B"
          strokeWidth="18"
          strokeLinecap="round"
        />

        {/* Divider line between red and green zones */}
        <line x1="200" y1="28" x2="200" y2="372" stroke="#111111" strokeWidth="6" />
        <line x1="28" y1="200" x2="372" y2="200" stroke="#111111" strokeWidth="6" />

        {/* Inner filled circle — background for icon and text */}
        <circle cx="200" cy="200" r="158" fill="#1A1A1A" />

        {/* Candlestick chart — 3 candles */}
        {/* Candle 1 — red (bearish), left */}
        <line x1="148" y1="148" x2="148" y2="195" stroke="#D72B2B" strokeWidth="2" strokeLinecap="round" />
        <rect x="140" y="158" width="16" height="24" rx="2" fill="#D72B2B" />

        {/* Candle 2 — green (bullish), center */}
        <line x1="200" y1="143" x2="200" y2="193" stroke="#1E8C3A" strokeWidth="2" strokeLinecap="round" />
        <rect x="192" y="150" width="16" height="30" rx="2" fill="#1E8C3A" />

        {/* Candle 3 — green (bullish), right */}
        <line x1="252" y1="138" x2="252" y2="188" stroke="#1E8C3A" strokeWidth="2" strokeLinecap="round" />
        <rect x="244" y="145" width="16" height="28" rx="2" fill="#1E8C3A" />

        {/* Upward trend arrow */}
        <polyline
          points="138,192 162,175 208,168 260,148"
          fill="none"
          stroke="#FFFFFF"
          strokeWidth="2.5"
          strokeLinecap="round"
          strokeLinejoin="round"
        />
        {/* Arrow head */}
        <polygon points="260,148 248,146 252,158" fill="#FFFFFF" />

        {/* Text: AVIATORS */}
        <text
          x="200"
          y="240"
          textAnchor="middle"
          fontFamily="'Orbitron', sans-serif"
          fontWeight="900"
          fontSize="28"
          letterSpacing="4"
          fill="#FFFFFF"
        >
          AVIATORS
        </text>

        {/* Text: LAB */}
        <text
          x="200"
          y="272"
          textAnchor="middle"
          fontFamily="'Orbitron', sans-serif"
          fontWeight="700"
          fontSize="18"
          letterSpacing="10"
          fill="#D72B2B"
        >
          LAB
        </text>

        {/* Bottom accent line — split red/green */}
        <line x1="112" y1="290" x2="198" y2="290" stroke="#D72B2B" strokeWidth="2" strokeLinecap="round" />
        <line x1="202" y1="290" x2="288" y2="290" stroke="#1E8C3A" strokeWidth="2" strokeLinecap="round" />

        {/* Small dot separator */}
        <circle cx="200" cy="290" r="2.5" fill="#FFFFFF" />
      </svg>